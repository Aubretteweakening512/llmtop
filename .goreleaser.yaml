version: 2

project_name: llmtop

before:
  hooks:
    - go mod tidy

builds:
  - id: llmtop
    main: ./cmd/llmtop
    binary: llmtop
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: llmtop
    builds:
      - llmtop
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - CONTRIBUTING.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: InfraWhisperer
    name: llmtop
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto

brews:
  - name: llmtop
    homepage: https://github.com/InfraWhisperer/llmtop
    description: "htop for your LLM inference cluster — real-time dashboard for vLLM, SGLang, LMCache, NIM with GPU monitoring"
    license: Apache-2.0
    repository:
      owner: InfraWhisperer
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    directory: Formula
    install: |
      bin.install "llmtop"
    test: |
      system "#{bin}/llmtop", "version"
